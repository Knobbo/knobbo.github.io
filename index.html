<html lang="en"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Hayes Mechanic — Service Calculator</title>
  <link rel="stylesheet" href="styles.css">
<style type="text/css" id="operaUserStyle"></style><style type="text/css"></style></head>
<body>
  <header class="site-header">
    <div class="brand">
      <div class="logo">🔧</div>
      <div class="brand-text">
        <h1 class="brand-title">HAYES MECHANIC — <span class="brand-sub">Service Calculator</span></h1>
      </div>
    </div>

    <!-- Controls + Tabs -->
    <div class="controls">
      <div class="tabs">
        <button id="tabService" class="btn small active">Service Calculator</button>
        <button id="tabMaterial" class="btn small">Material Calculator</button>
      </div>

      <div class="actions">
        <button id="resetBtn" class="btn">Reset</button>
      </div>
    </div>
  </header>

  <main class="dashboard">

  <!-- LEFT COLUMN -->
  <div class="main-content">

    <section class="card" id="itemsSection">
      <h2>Items</h2>
      <!-- KEEP YOUR TABLE EXACTLY AS IS -->
    </section>

    <section class="card" id="upgradesSection">
      <h2>Upgrades</h2>
    </section>

    <section class="card" id="repairSection">
      <h2>Repair</h2>
    </section>

    <section class="card hidden" id="materialCard">
      <h2>Material Calculator</h2>
    </section>

  </div>

  <!-- RIGHT SIDEBAR -->
  <aside class="sidebar">

    <div class="card totals-card">
      <!-- KEEP YOUR TOTALS HTML -->
    </div>

    <div class="card picture-of-week">
      <!-- KEEP YOUR IMAGE -->
    </div>

  </aside>

</main>

  <script src="script.js"></script>

</body></html>
